<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Party</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── NAVIGATION ── -->
  <nav class="nav">
    <button class="nav-brand" data-section="home">
      🏠 <span id="nav-title">Party</span>
    </button>
    <div class="nav-links">
      <button class="nav-btn" data-section="home">Home</button>
      <button class="nav-btn" data-section="guests">Guests</button>
      <button class="nav-btn" data-section="facts">Who Am I?</button>
      <button class="nav-btn" data-section="jeopardy">Jeopardy</button>
    </div>
  </nav>


  <!-- ── HOME ── -->
  <section id="section-home" class="section" hidden>
    <div class="hero">
      <h1 class="hero-title" id="hero-title">Welcome</h1>
      <p class="hero-sub" id="hero-subtitle"></p>
      <div class="hero-cards">

        <button class="hero-card" data-section="guests">
          <div class="hero-icon">👥</div>
          <div class="hero-card-label">Guests</div>
          <div class="hero-card-desc">Who's here tonight</div>
        </button>

        <button class="hero-card" data-section="facts">
          <div class="hero-icon">🕵️</div>
          <div class="hero-card-label">Who Am I?</div>
          <div class="hero-card-desc">Guess the guest from clues</div>
        </button>

        <button class="hero-card" data-section="jeopardy">
          <div class="hero-icon">🎯</div>
          <div class="hero-card-label">Jeopardy!</div>
          <div class="hero-card-desc">The classic trivia showdown</div>
        </button>

      </div>
    </div>
  </section>


  <!-- ── GUESTS ── -->
  <section id="section-guests" class="section" hidden>
    <div class="section-header">
      <h2>The Guests</h2>
      <p class="section-sub">Everyone here tonight</p>
    </div>
    <div id="guests-grid" class="guests-grid"></div>
  </section>


  <!-- ── FACTS / WHO AM I ── -->
  <section id="section-facts" class="section" hidden>
    <div class="section-header">
      <h2>Who Am I?</h2>
      <p class="section-sub">Read the clue — guess the guest — then reveal</p>
    </div>

    <div class="facts-wrap">
      <div class="fact-card">

        <div class="fact-meta" id="fact-meta">1 of N</div>

        <div class="fact-body">
          <span class="fact-quote">&ldquo;</span>
          <p class="fact-text" id="fact-text">Loading…</p>
        </div>

        <!-- Revealed identity — hidden until button clicked -->
        <div class="fact-reveal" id="fact-reveal" hidden>
          <div class="reveal-rule"></div>
          <div class="reveal-inner">
            <div class="reveal-photo-wrap" id="reveal-photo-wrap">
              <span class="reveal-placeholder">👤</span>
            </div>
            <div class="reveal-name" id="reveal-name"></div>
          </div>
        </div>

        <div class="fact-controls">
          <button class="btn btn-ghost" id="btn-prev">← Prev</button>
          <button class="btn btn-reveal" id="btn-reveal">🎭 Reveal</button>
          <button class="btn btn-ghost" id="btn-next">Next →</button>
        </div>

      </div>

      <button class="btn btn-text" id="btn-shuffle">🔀 Shuffle order</button>
    </div>
  </section>


  <!-- ── JEOPARDY ── -->
  <section id="section-jeopardy" class="section section--jeopardy" hidden>
    <div class="section-header">
      <h2>Jeopardy!</h2>
      <div id="scoreboard" class="scoreboard"></div>
    </div>

    <div class="board-wrap">
      <div id="jeopardy-board" class="jeopardy-board"></div>
    </div>

    <div class="jeopardy-footer">
      <button class="btn btn-ghost" id="btn-reset">↺ Reset board &amp; scores</button>
    </div>
  </section>


  <!-- ── JEOPARDY MODAL ── -->
  <div id="modal" class="modal-overlay" hidden>
    <div class="modal-box" role="dialog" aria-modal="true">

      <div class="modal-cat" id="modal-cat"></div>
      <div class="modal-val" id="modal-val"></div>
      <div class="modal-clue" id="modal-clue"></div>

      <!-- Answer (hidden until "Show Answer" clicked) -->
      <div class="modal-answer" id="modal-answer" hidden></div>

      <!-- Team scoring buttons (appear after answer is revealed) -->
      <div class="modal-teams" id="modal-teams" hidden></div>

      <div class="modal-actions">
        <button class="btn btn-ghost" id="btn-modal-close">✕ Close</button>
        <button class="btn btn-show-answer" id="btn-modal-answer">Show Answer</button>
      </div>

    </div>
  </div>


  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
